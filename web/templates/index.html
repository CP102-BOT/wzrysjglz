<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者荣耀世界攻略站</title>
    <style>
        :root {
            --bg: #0d1116;
            --surface: #161b22;
            --surface-hover: #1c2333;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #daa520;
            --accent-hover: #f0c040;
            --accent-bg: rgba(218,165,32,0.08);
            --accent-border: rgba(218,165,32,0.2);
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --radius: 0.75rem;
            --radius-lg: 1rem;
        }
        [data-theme="light"] {
            --bg: #f6f8fa;
            --surface: #fff;
            --surface-hover: #f0f2f5;
            --border: #d0d7de;
            --text: #1f2328;
            --text-dim: #656d76;
            --accent: #b8860b;
            --accent-hover: #9a6d0a;
            --accent-bg: rgba(184,134,11,0.06);
            --accent-border: rgba(184,134,11,0.2);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
            background:var(--bg); color:var(--text); line-height:1.7; min-height:100vh;
        }
        a { color:var(--accent); text-decoration:none; }
        a:hover { color:var(--accent-hover); }

        /* Header */
        .header {
            background:var(--surface); border-bottom:1px solid var(--border);
            padding:0 2rem; position:sticky; top:0; z-index:100;
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
        }
        .header-inner {
            max-width:1200px; margin:0 auto; display:flex;
            justify-content:space-between; align-items:center; height:60px;
        }
        .logo { font-size:1.2rem; font-weight:800; color:var(--accent); letter-spacing:-0.02em; }
        .header-nav { display:flex; gap:0.25rem; }
        .header-nav a {
            padding:0.45rem 1.25rem; border-radius:0.5rem; color:var(--text-dim);
            font-size:0.9rem; font-weight:500; transition:0.2s;
        }
        .header-nav a:hover, .header-nav a.active {
            color:var(--text); background:var(--accent-bg);
        }
        .header-nav a.active { color:var(--accent); }
        .header-actions { display:flex; gap:0.5rem; align-items:center; }
        .btn-icon {
            width:36px; height:36px; border-radius:0.5rem; border:1px solid var(--border);
            background:var(--surface); color:var(--text-dim); cursor:pointer;
            font-size:1rem; display:flex; align-items:center; justify-content:center;
            transition:0.2s;
        }
        .btn-icon:hover { color:var(--accent); border-color:var(--accent-border); }

        /* Main */
        .container { max-width:1200px; margin:0 auto; padding:2rem; }

        /* Hero Section */
        .hero {
            text-align:center; padding:2.5rem 0 1.5rem;
            border-bottom:1px solid var(--border); margin-bottom:1.5rem;
        }
        .hero h1 { font-size:2rem; font-weight:800; margin-bottom:0.5rem; }
        .hero p { color:var(--text-dim); font-size:1rem; max-width:600px; margin:0 auto; }

        /* Search */
        .search-wrap { margin-bottom:1.5rem; position:relative; max-width:500px; }
        .search-input {
            width:100%; padding:0.75rem 1rem 0.75rem 2.75rem;
            border-radius:0.75rem; border:1.5px solid var(--border);
            background:var(--surface); color:var(--text); font-size:0.95rem;
            outline:none; transition:0.2s;
        }
        .search-input:focus { border-color:var(--accent); }
        .search-icon {
            position:absolute; left:1rem; top:50%; transform:translateY(-50%);
            color:var(--text-dim); font-size:1rem; pointer-events:none;
        }

        /* Filter Tags */
        .filter-row {
            display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center; margin-bottom:1.5rem;
        }
        .filter-label { color:var(--text-dim); font-size:0.85rem; margin-right:0.25rem; font-weight:500; }
        .filter-tag {
            padding:0.3rem 0.85rem; border-radius:2rem; cursor:pointer;
            border:1.5px solid var(--border); background:var(--surface);
            color:var(--text-dim); font-size:0.82rem; transition:0.2s; user-select:none;
        }
        .filter-tag:hover { border-color:var(--accent); color:var(--accent); }
        .filter-tag.active {
            background:var(--accent); color:#fff; border-color:var(--accent);
        }
        .sort-select {
            margin-left:auto; padding:0.4rem 0.75rem; border-radius:0.5rem;
            border:1.5px solid var(--border); background:var(--surface);
            color:var(--text); font-size:0.85rem; cursor:pointer; outline:none;
        }

        /* Guide Cards */
        .section-title {
            font-size:1.3rem; font-weight:700; margin-bottom:1.25rem;
            display:flex; align-items:center; gap:0.5rem;
        }
        .guide-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:1.25rem; }
        .result-count { color:var(--text-dim); font-size:0.85rem; margin-bottom:1rem; }

        .guide-card {
            background:var(--surface); border:1.5px solid var(--border);
            border-radius:var(--radius-lg); padding:1.5rem; cursor:pointer;
            transition:0.25s; position:relative; overflow:hidden;
        }
        .guide-card:hover { border-color:var(--accent-border); transform:translateY(-3px); }
        .guide-card .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.6rem; }
        .guide-card .card-title { font-size:1.05rem; font-weight:700; line-height:1.4; flex:1; }
        .guide-card .card-badges { display:flex; gap:0.3rem; flex-shrink:0; margin-left:0.5rem; }
        .badge { padding:0.15rem 0.5rem; border-radius:0.3rem; font-size:0.72rem; font-weight:700; }
        .badge-hot { background:rgba(239,68,68,0.15); color:var(--red); }
        .badge-new { background:rgba(34,197,94,0.15); color:var(--green); }
        .card-meta {
            display:flex; gap:1rem; color:var(--text-dim); font-size:0.8rem; margin-bottom:0.6rem;
        }
        .card-tags { display:flex; gap:0.35rem; flex-wrap:wrap; margin-bottom:0.6rem; }
        .card-tag {
            padding:0.15rem 0.5rem; border-radius:0.3rem;
            background:var(--accent-bg); color:var(--accent);
            font-size:0.75rem; font-weight:500;
            border:1px solid var(--accent-border);
        }
        .card-desc { color:var(--text-dim); font-size:0.88rem; line-height:1.6; }
        .card-footer {
            display:flex; justify-content:space-between; align-items:center; margin-top:0.8rem;
            padding-top:0.8rem; border-top:1px solid var(--border);
        }
        .card-footer .views { color:var(--text-dim); font-size:0.78rem; }
        .card-footer .difficulty {
            padding:0.2rem 0.6rem; border-radius:0.3rem; font-size:0.75rem; font-weight:600;
        }
        .diff-beginner { background:rgba(34,197,94,0.1); color:var(--green); }
        .diff-intermediate { background:rgba(59,130,246,0.1); color:var(--blue); }
        .diff-advanced { background:rgba(239,68,68,0.1); color:var(--red); }

        /* Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);
            display:none; align-items:center; justify-content:center; z-index:200; padding:1rem;
        }
        .modal-overlay.active { display:flex; }
        .modal {
            background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border);
            max-width:800px; width:100%; max-height:85vh; overflow-y:auto;
            box-shadow:0 20px 60px rgba(0,0,0,0.4);
        }
        .modal-header {
            padding:1.25rem 1.5rem; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; background:var(--surface); z-index:10;
        }
        .modal-header h2 { font-size:1.25rem; font-weight:700; color:var(--accent); }
        .modal-close {
            background:none; border:none; color:var(--text-dim); font-size:1.3rem;
            cursor:pointer; width:36px; height:36px; border-radius:0.5rem;
            display:flex; align-items:center; justify-content:center; transition:0.2s;
        }
        .modal-close:hover { background:var(--bg); color:var(--red); }
        .modal-body { padding:1.5rem; }
        .modal-body h3 { font-size:1.1rem; margin:1.5rem 0 0.75rem; color:var(--accent); font-weight:700; }
        .modal-body h3:first-child { margin-top:0; }
        .modal-body p { margin-bottom:0.75rem; line-height:1.9; }
        .modal-body strong { color:var(--text); }
        .modal-meta {
            display:flex; flex-wrap:wrap; gap:0.75rem; margin-bottom:1rem;
            padding-bottom:1rem; border-bottom:1px solid var(--border);
        }
        .modal-meta span { color:var(--text-dim); font-size:0.85rem; }

        /* Empty State */
        .empty-state { text-align:center; padding:4rem 2rem; color:var(--text-dim); }
        .empty-state .icon { font-size:3rem; margin-bottom:1rem; opacity:0.6; }

        /* Loading */
        .loading { text-align:center; padding:3rem; color:var(--text-dim); }
        .loading::after { content:""; display:inline-block; width:1rem; height:1rem; border:2px solid var(--text-dim); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-left:0.5rem; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        /* Mobile */
        @media (max-width:640px) {
            .header { padding:0 1rem; }
            .container { padding:1rem; }
            .hero h1 { font-size:1.5rem; }
            .guide-grid { grid-template-columns:1fr; }
            .filter-row { gap:0.3rem; }
            .filter-tag { padding:0.25rem 0.65rem; font-size:0.78rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">王者荣耀世界攻略站</a>
            <nav class="header-nav">
                <a href="/" id="nav-all">首页</a>
                <a href="/exploration" id="nav-exploration">🌍 探险攻略</a>
                <a href="/pvp" id="nav-pvp">⚔️ PVP技巧</a>
            </nav>
            <div class="header-actions">
                <button class="btn-icon" id="themeBtn" title="切换主题">🌙</button>
                <a class="btn-icon" href="/admin" title="管理后台" style="font-size:0.85rem;">⚙</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1 id="pageTitle">王者荣耀世界攻略站</h1>
            <p id="pageSubtitle">开放世界探险指南 & PVP对战技巧收录</p>
        </div>

        <!-- Search -->
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索攻略...">
        </div>

        <!-- Filters -->
        <div class="filter-row" id="filterRow">
            <span class="filter-label">分类：</span>
            <span class="filter-tag active" data-category="all">全部</span>
        </div>

        <!-- Content -->
        <div class="result-count" id="resultCount"></div>
        <div class="guide-grid" id="guideGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const BASE = '';
        let currentTab = '{{ active_tab or "all" }}';
        let currentCategory = 'all';
        let currentSort = 'newest';
        let currentSearch = '';

        const EXPLORATION_CATEGORIES = {{ exploration_categories | tojson }};
        const PVP_CATEGORIES = {{ pvp_categories | tojson }};
        const DIFFICULTY_LEVELS = {{ difficulty_levels | tojson }};

        // Theme
        (function() {
            const saved = localStorage.getItem('wzry_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('themeBtn').textContent = saved === 'light' ? '☀️' : '🌙';
        })();

        document.getElementById('themeBtn').addEventListener('click', () => {
            const el = document.documentElement;
            const isLight = el.getAttribute('data-theme') === 'light';
            el.setAttribute('data-theme', isLight ? 'dark' : 'light');
            document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('wzry_theme', isLight ? 'dark' : 'light');
        });

        // Navigation
        function setActiveTab(tab) {
            currentTab = tab;
            currentCategory = 'all';
            currentSearch = '';
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.header-nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${tab}`)?.classList.add('active');

            if (tab === 'all') {
                document.getElementById('pageTitle').textContent = '王者荣耀世界攻略站';
                document.getElementById('pageSubtitle').textContent = '开放世界探险指南 & PVP对战技巧收录';
                loadAll();
            } else if (tab === 'exploration') {
                document.getElementById('pageTitle').textContent = '🌍 开放世界探险攻略';
                document.getElementById('pageSubtitle').textContent = '地图探索、资源收集、隐藏要素、BOSS攻略';
                buildFilters(EXPLORATION_CATEGORIES);
                loadExploration();
            } else if (tab === 'pvp') {
                document.getElementById('pageTitle').textContent = '⚔️ PVP技巧收录';
                document.getElementById('pageSubtitle').textContent = '角色技巧、连招教学、阵容搭配、对战策略';
                buildFilters(PVP_CATEGORIES);
                loadPvp();
            }
        }

        // Build filter tags
        function buildFilters(categories) {
            let html = '<span class="filter-label">分类：</span>';
            html += '<span class="filter-tag active" data-category="all">全部</span>';
            categories.forEach(c => {
                html += `<span class="filter-tag" data-category="${c}">${c}</span>`;
            });
            html += '<select class="sort-select" id="sortSelect">';
            html += '<option value="newest">最新</option>';
            html += '<option value="hot">最热</option>';
            html += '</select>';
            document.getElementById('filterRow').innerHTML = html;

            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    if (currentTab === 'exploration') loadExploration();
                    else if (currentTab === 'pvp') loadPvp();
                });
            });

            document.getElementById('sortSelect').addEventListener('change', function() {
                currentSort = this.value;
                if (currentTab === 'exploration') loadExploration();
                else if (currentTab === 'pvp') loadPvp();
            });
        }

        // Load data
        async function loadAll() {
            document.getElementById('filterRow').style.display = 'none';
            const grid = document.getElementById('guideGrid');
            grid.innerHTML = '<div class="loading"></div>';
            try {
                const [exp, pvp] = await Promise.all([
                    fetch(`${BASE}/api/exploration?sort=hot&_=${Date.now()}`).then(r => r.json()),
                    fetch(`${BASE}/api/pvp?sort=hot&_=${Date.now()}`).then(r => r.json())
                ]);
                const all = [...(Array.isArray(exp) ? exp : []), ...(Array.isArray(pvp) ? pvp : [])];
                all.sort((a, b) => b.view_count - a.view_count);
                document.getElementById('resultCount').textContent = `共 ${all.length} 篇攻略`;
                document.getElementById('filterRow').style.display = 'none';
                grid.innerHTML = all.length ? all.map((item, i) => renderCard(item, item.category && PVP_CATEGORIES.includes(item.category) ? 'pvp' : 'exploration', i)).join('') : '<div class="empty-state"><div class="icon">📝</div><p>暂无攻略内容</p></div>';
            } catch(e) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
            }
            bindCardClicks();
        }

        async function loadExploration() {
            const grid = document.getElementById('guideGrid');
            grid.innerHTML = '<div class="loading"></div>';
            const params = new URLSearchParams({ sort: currentSort, _: Date.now() });
            if (currentCategory !== 'all') params.set('category', currentCategory);
            if (currentSearch) params.set('search', currentSearch);
            try {
                const res = await fetch(`${BASE}/api/exploration?${params}`);
                const data = await res.json();
                document.getElementById('resultCount').textContent = `共 ${data.length} 篇探险攻略`;
                grid.innerHTML = data.length ? data.map((item, i) => renderCard(item, 'exploration', i)).join('') : '<div class="empty-state"><div class="icon">🗺️</div><p>暂无相关攻略</p></div>';
            } catch(e) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
            }
            bindCardClicks();
        }

        async function loadPvp() {
            const grid = document.getElementById('guideGrid');
            grid.innerHTML = '<div class="loading"></div>';
            const params = new URLSearchParams({ sort: currentSort, _: Date.now() });
            if (currentCategory !== 'all') params.set('category', currentCategory);
            if (currentSearch) params.set('search', currentSearch);
            try {
                const res = await fetch(`${BASE}/api/pvp?${params}`);
                const data = await res.json();
                document.getElementById('resultCount').textContent = `共 ${data.length} 篇PVP技巧`;
                grid.innerHTML = data.length ? data.map((item, i) => renderCard(item, 'pvp', i)).join('') : '<div class="empty-state"><div class="icon">⚔️</div><p>暂无相关技巧</p></div>';
            } catch(e) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
            }
            bindCardClicks();
        }

        function renderCard(item, type, index) {
            const diffClass = item.difficulty === '入门' ? 'diff-beginner' : item.difficulty === '进阶' ? 'diff-intermediate' : 'diff-advanced';
            const tags = (item.tags || []).slice(0, 3);
            return `
            <div class="guide-card" data-type="${type}" data-slug="${item.slug}" style="animation-delay:${index * 0.04}s">
                <div class="card-header">
                    <span class="card-title">${item.title}</span>
                    <div class="card-badges">
                        ${item.is_hot ? '<span class="badge badge-hot">热门</span>' : ''}
                        ${item.is_new ? '<span class="badge badge-new">最新</span>' : ''}
                    </div>
                </div>
                <div class="card-meta">
                    <span>📂 ${item.category}</span>
                    <span>${type === 'exploration' ? '🗺️' : '⚔️'} ${type === 'exploration' ? '探险攻略' : 'PVP技巧'}</span>
                </div>
                ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>` : ''}
                <div class="card-desc">${item.description}</div>
                <div class="card-footer">
                    <span class="views">👁 ${item.view_count} 次阅读</span>
                    <span class="difficulty ${diffClass}">${item.difficulty}</span>
                </div>
            </div>`;
        }

        function bindCardClicks() {
            document.querySelectorAll('.guide-card').forEach(card => {
                card.addEventListener('click', async function() {
                    const type = this.dataset.type;
                    const slug = this.dataset.slug;
                    try {
                        const res = await fetch(`${BASE}/api/${type}/${slug}?_=${Date.now()}`);
                        const data = await res.json();
                        openModal(data, type);
                    } catch(e) {
                        alert('加载失败');
                    }
                });
            });
        }

        // Modal
        function openModal(item, type) {
            document.getElementById('modalTitle').textContent = item.title;
            let meta = `<span>📂 ${item.category}</span>`;
            meta += `<span>${type === 'exploration' ? '🗺️' : '⚔️'} ${type === 'exploration' ? '探险攻略' : 'PVP技巧'}</span>`;
            meta += `<span>难度：${item.difficulty}</span>`;
            meta += `<span>👁 ${item.view_count + 1} 次阅读</span>`;
            if (item.tags && item.tags.length) {
                meta += `<span>标签：${item.tags.map(t => `<span class="card-tag">${t}</span>`).join(' ')}</span>`;
            }

            const body = document.getElementById('modalBody');
            body.innerHTML = `<div class="modal-meta">${meta}</div>${item.content}`;
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';

            // Bind all links inside content to open in new tab
            body.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // Search (debounced)
        let searchTimer;
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimer);
            currentSearch = this.value;
            searchTimer = setTimeout(() => {
                if (currentTab === 'exploration') loadExploration();
                else if (currentTab === 'pvp') loadPvp();
            }, 300);
        });

        // Init
        {% if active_tab %}
        setActiveTab('{{ active_tab }}');
        {% else %}
        setActiveTab('all');
        {% endif %}

        // Browser back/forward
        window.addEventListener('popstate', function(e) {
            const path = window.location.pathname;
            if (path === '/' || path === '') setActiveTab('all');
            else if (path === '/exploration') setActiveTab('exploration');
            else if (path === '/pvp') setActiveTab('pvp');
        });
    </script>
</body>
</html>
